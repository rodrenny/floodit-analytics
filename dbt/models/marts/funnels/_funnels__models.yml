version: 2

models:
  - name: level_funnel_daily
    description: >
      Grain: one row per day per quickplay board size (S/M/L).
      Funnel: start → end → complete/fail, plus retries and resets.
      Invariants (completes <= starts, ends <= starts) were verified across
      all 114 available days before being encoded as tests. Progressive
      mode is deliberately out of scope (linear campaign, not a funnel).
    config:
      contract:
        enforced: true
    columns:
      - name: funnel_day_pk
        description: Surrogate over (event_date, board).
        data_type: string
        data_tests:
          - unique
          - not_null
      - name: event_date
        description: Calendar day (UTC).
        data_type: date
        data_tests:
          - not_null
      - name: board
        description: Quickplay board size (S/M/L).
        data_type: string
        data_tests:
          - not_null
      - name: starts
        description: level_start_quickplay events.
        data_type: int64
      - name: ends
        description: level_end_quickplay events.
        data_type: int64
      - name: completes
        description: level_complete_quickplay events.
        data_type: int64
      - name: fails
        description: level_fail_quickplay events.
        data_type: int64
      - name: retries
        description: level_retry_quickplay events.
        data_type: int64
      - name: resets
        description: level_reset_quickplay events.
        data_type: int64
      - name: users_starting
        description: Distinct users with at least one start.
        data_type: int64
      - name: completion_rate
        description: completes / starts; null when starts = 0.
        data_type: float64
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "completes <= starts"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "ends <= starts"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "completion_rate is null or completion_rate between 0 and 1"
