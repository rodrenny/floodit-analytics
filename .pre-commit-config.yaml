repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^dbt/(dbt_project|profiles)\.yml # dbt YAML may use jinja
      - id: check-added-large-files
      - id: detect-private-key
      - id: check-merge-conflict

  # Local hooks run through uv so tool versions are single-sourced in uv.lock.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
      - id: sqlfluff-lint
        name: sqlfluff lint
        entry: uv run sqlfluff lint
        language: system
        types: [sql]
        files: ^dbt/models/
